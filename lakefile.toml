name = "AttentionLean"
defaultTargets = ["AttentionLean", "axiom_check"]
testDriver = "adequacy_cli_test"

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.28.0"

[[lean_lib]]
name = "AttentionLean"
globs = ["AttentionLean.+"]

[[lean_exe]]
name = "axiom_check"
root = "AttentionLean.Axioms"

[[lean_exe]]
name = "adequacy_oracle"
root = "AttentionLean.AdequacyOracle"

[[lean_exe]]
name = "adequacy_cli_test"
root = "Test.AdequacyCli"
